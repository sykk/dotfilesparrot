conky.config = {
    alignment = 'top_right',
    gap_x = 28,
    gap_y = 66,
    minimum_width = 330,
    maximum_width = 330,

    background = true,
    update_interval = 1.5,
    total_run_times = 0,
    double_buffer = true,
    no_buffers = true,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    top_cpu_separate = false,
    top_name_verbose = false,
    top_name_width = 14,

    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 132,
    own_window_colour = '061006',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    draw_shades = true,
    default_shade_color = '000000',
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,
    border_inner_margin = 14,
    border_outer_margin = 0,

    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=10',
    xftalpha = 1.0,
    uppercase = false,
    override_utf8_locale = true,
    text_buffer_size = 4096,

    default_color = 'dfffd5',
    color0 = '79ff3f',
    color1 = 'a9f283',
    color2 = '93bb83',
    color3 = 'd3ff5e',
    color4 = 'ff5060',

    template0 = [[${color2}${alignr}${color}]],
};

conky.text = [[
${font JetBrainsMono Nerd Font:bold:size=16}${color0}${alignr}${nodename}${font}
${font JetBrainsMono Nerd Font:size=10}${color1}${alignr}${time %A, %b %d  %H:%M}${font}${color}

${color0}${hr 1}${color}
${font JetBrainsMono Nerd Font:bold:size=10}${color3}SYSTEM${font}${color}
${color2}Kernel${alignr}${color}${kernel}
${color2}Uptime${alignr}${color}${uptime_short}
${color2}Load${alignr}${color}${loadavg}

${font JetBrainsMono Nerd Font:bold:size=10}${color3}CPU${font}${color}
${color2}Usage${alignr}${color}${cpu cpu0}% ${color1}${cpubar cpu0 7,98}${color}
${color2}Temp${alignr}${color}${if_existing /sys/class/thermal/thermal_zone0/temp}${acpitemp} C${else}n/a${endif}
${color2}Top${alignr}${color}${top name 1} ${top cpu 1}%

${font JetBrainsMono Nerd Font:bold:size=10}${color3}MEMORY${font}${color}
${color2}RAM${alignr}${color}${memperc}% ${color1}${membar 7,98}${color}
${color2}Used${alignr}${color}${mem} / ${memmax}
${color2}Top${alignr}${color}${top_mem name 1} ${top_mem mem_res 1}

${font JetBrainsMono Nerd Font:bold:size=10}${color3}DISK${font}${color}
${color2}Root${alignr}${color}${fs_used /} / ${fs_size /}
${color1}${fs_bar 7 /}${color}

${font JetBrainsMono Nerd Font:bold:size=10}${color3}NETWORK${font}${color}
${if_up eno1}${color2}eno1 down${alignr}${color}${downspeed eno1}/s
${color2}eno1 up${alignr}${color}${upspeed eno1}/s${else}${if_up eth0}${color2}eth0 down${alignr}${color}${downspeed eth0}/s
${color2}eth0 up${alignr}${color}${upspeed eth0}/s${else}${if_up wlan0}${color2}wlan0 down${alignr}${color}${downspeed wlan0}/s
${color2}wlan0 up${alignr}${color}${upspeed wlan0}/s${else}${color2}Interface${alignr}${color}offline${endif}${endif}${endif}
]];
